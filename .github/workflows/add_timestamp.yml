name: Add timestamp to Python files

on:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "**/*.py"

permissions:
  contents: write

jobs:
  add-timestamp:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add or update timestamp header
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Asia/Shanghai")).strftime("%Y-%m-%d %H:%M:%S")
          timestamp_line = f"# Last updated: {now} Beijing Time\n"

          for target in Path(".").rglob("*.py"):
              if ".git" in target.parts:
                  continue

              content = target.read_text(encoding="utf-8")
              lines = content.splitlines(keepends=True)

              insert_index = 0

              # 如果第一行是 shebang，比如 #!/usr/bin/env python3，不能插在它前面
              if lines and lines[0].startswith("#!"):
                  insert_index = 1

              # 如果有编码声明，比如 # -*- coding: utf-8 -*-，也尽量放在它后面
              if len(lines) > insert_index and "coding" in lines[insert_index]:
                  insert_index += 1

              # 如果已经有时间戳，就更新它
              updated = False
              for i, line in enumerate(lines[:5]):
                  if line.startswith("# Last updated:"):
                      lines[i] = timestamp_line
                      updated = True
                      break

              if not updated:
                  lines.insert(insert_index, timestamp_line)

              target.write_text("".join(lines), encoding="utf-8")
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: update Python timestamps"
            git push
          else
            echo "No changes to commit"
          fi
